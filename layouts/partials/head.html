<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    {{/* Menghindari Duplikasi Judul dan Bagus untuk SEO */}}
    <title>{{ if .IsHome }}LKP NexGen - Pusat Pelatihan Digital{{ else }}{{ .Title }} | LKP NexGen{{ end }}</title>
    
    {{/* Meta Deskripsi Dinamis yang Aman dari Error */}}
    <meta name="description" content="{{ if .Description }}{{ .Description }}{{ else }}Lembaga Kursus Komputer NexGen - Pusat Pelatihan TI Terbaik{{ end }}">
    
    {{/* Open Graph / Facebook SEO */}}
    <meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
    <meta property="og:title" content="{{ if .Title }}{{ .Title }}{{ else }}LKP NexGen{{ end }}">
    <meta property="og:description" content="{{ if .Description }}{{ .Description }}{{ else }}Lembaga Kursus Komputer NexGen{{ end }}">
    <meta property="og:url" content="{{ .Permalink }}">
    
    {{/* Jalur Pintas CDN Tailwind CSS */}}
    <script src="https://cdn.tailwindcss.com"></script>
</head>
